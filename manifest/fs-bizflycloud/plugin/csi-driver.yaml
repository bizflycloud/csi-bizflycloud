# CSIDriver object for file storage
# Key differences from block volume:
# - attachRequired: false (NFS doesn't need controller attach/detach)
# - podInfoOnMount: false
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: fs.csi.bizflycloud.vn
spec:
  attachRequired: false
  podInfoOnMount: false
  volumeLifecycleModes:
  - Persistent
