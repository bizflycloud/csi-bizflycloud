# Secret for BizFly Cloud authentication
# This is shared with the block volume CSI driver.
# If you already have the 'bizflycloud' secret deployed, you can skip this file.
#
# For STAGING: use staging credentials and api_url below.
# For PRODUCTION: change api_url to "https://manage.bizflycloud.vn"
apiVersion: v1
kind: Secret
metadata:
  name: bizflycloud
  namespace: kube-system
stringData:
  application_credential_id: "<YOUR_APP_CREDENTIAL_ID>"
  application_credential_secret: "<YOUR_APP_CREDENTIAL_SECRET>"
  tenant_id: "<YOUR_TENANT_ID>"
  region: "HN"    
  api_url: "https://staging.bizflycloud.vn"
