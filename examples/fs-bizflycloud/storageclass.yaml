apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: bizflycloud-fs
provisioner: fs.csi.bizflycloud.vn
parameters:
  # Availability zone
  zone: HN1
  # Share protocol (default: NFS)
  share_protocol: NFS
  # Network ID for the share (required)
  network_id: "79531ebb-dfb3-478b-bddc-244cb2769a98"
  # Subnet ID for the share (optional)
  subnet_id: "9e031e70-52ca-4345-bf6a-faa2cccb7ca8"
  # Share type (optional)
  share_type: "share-type-1"
  # IP access rule - restrict to VPC CIDR for security
  # Default: 0.0.0.0/0 (allow all)
  # Recommended: Use your VPC CIDR (e.g., 10.0.0.0/16)
  nfs-shareClient: "0.0.0.0/0"
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
